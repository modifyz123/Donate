<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>Donate Goal</title>
<link href="https://fonts.googleapis.com/css2?family=Pridi:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: transparent; font-family: 'Pridi', sans-serif; padding: 12px; }
.goal-wrap {
  background: rgba(0,0,0,0.7);
  border-radius: 12px;
  padding: 14px 18px;
  backdrop-filter: blur(6px);
  min-width: 400px;
}
.goal-title { color: #fff; font-size: 15px; text-align: center; margin-bottom: 10px; font-weight: 600; }
.bar-track { height: 28px; background: rgba(255,255,255,0.1); border-radius: 14px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 14px; transition: width 1s ease; }
.bar-label {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
.goal-footer { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="goal-wrap">
  <div class="goal-title" id="title">Donate Goal</div>
  <div class="bar-track">
    <div class="bar-fill" id="fill" style="width:2%"></div>
    <div class="bar-label" id="label">฿0 (0%)</div>
  </div>
  <div class="goal-footer">
    <span>฿0</span>
    <span id="goal-max">฿2,000</span>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');

async function load() {
  try {
    const r = await fetch('/api/donations/goal-stats');
    const d = await r.json();
    document.getElementById('title').textContent = d.goalTitle;
    document.getElementById('fill').style.width = Math.max(2, d.percent) + '%';
    document.getElementById('label').textContent = `฿${Number(d.total).toLocaleString('th-TH',{minimumFractionDigits:2})} (${d.percent.toFixed(1)}%)`;
    document.getElementById('goal-max').textContent = `฿${Number(d.goalAmount).toLocaleString('th-TH')}`;
  } catch(e){}
}

load();
const socket = io('/');
socket.on('connect', () => socket.emit('join-room', { room: 'goal', token }));
socket.on('goal-updated', load);
socket.on('settings-updated', load);
</script>
</body>
</html>
